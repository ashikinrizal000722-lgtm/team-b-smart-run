<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fun Run - Central Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 20px 0;
            background: #1e3c72;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-indicator {
            font-size: 0.9rem;
            color: #a8ffb2;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }
        th {
            background-color: #2c3e50;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f9fbfd;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .badge-normal {
            background-color: #d4edda;
            color: #155724;
        }
        .badge-emergency {
            background-color: #f8d7da;
            color: #721c24;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏃‍♂️ Smart Fun Run Central Dashboard</h1>
        <div class="status-indicator">● Sistem Live (Kemas kini automatik setiap 3 saat)</div>
    </header>

    <table id="logsTable">
        <thead>
            <tr>
                <th>Masa / Tarikh</th>
                <th>Device ID</th>
                <th>Runner ID</th>
                <th>Suhu (°C)</th>
                <th>Kelembapan (%)</th>
                <th>Status SOS</th>
            </tr>
        </thead>
        <tbody id="logsBody">
            <tr>
                <td colspan="6" style="text-align: center; color: #888;">Menunggu data daripada server...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    async function fetchLiveLogs() {
        try {
            // Memanggil API live feed daripada server Flask
            const response = await fetch('http://localhost:5000/api/safety/live');
            if (!response.ok) throw new Error('Gagal mendapatkan respon dari server.');
            
            const logs = await response.json();
            const tbody = document.getElementById('logsBody');
            tbody.innerHTML = ''; 

            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #888;">Tiada rekod data dijumpai di dalam safety_logs.json.</td></tr>`;
                return;
            }

            // Susun data supaya log terbaharu berada di atas
            logs.reverse();

            logs.forEach(log => {
                const date = new Date(log.timestamp * 1000).toLocaleString('ms-MY');
                const sosBadge = log.emergency_sos 
                    ? '<span class="badge badge-emergency">⚠️ EMERGENCY SOS</span>' 
                    : '<span class="badge badge-normal">Selamat</span>';

                const row = `
                    <tr>
                        <td>${date}</td>
                        <td><strong>${log.device_id}</strong></td>
                        <td>${log.runner_id}</td>
                        <td>${log.telemetry.temperature_c} °C</td>
                        <td>${log.telemetry.humidity_pct} %</td>
                        <td>${sosBadge}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

        } catch (error) {
            console.error('Ralat Dashboard:', error);
            document.getElementById('logsBody').innerHTML = `
                <tr>
                    <td colspan="6" style="text-align: center; color: red; font-weight: bold;">
                        Ralat: Pastikan server.py telah dijalankan pada Port 5000!
                    </td>
                </tr>`;
        }
    }

    // Panggil fungsi sebaik halaman dibuka
    fetchLiveLogs();
    
    // Kemas kini secara automatik setiap 3 saat
    setInterval(fetchLiveLogs, 3000);
</script>

</body>
</html>
